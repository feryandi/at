<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>at — deploy</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-card: #161616;
      --bg-hover: #1c1c1c;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --dim: #555;
      --accent: #4f8ef7;
      --accent-h: #6ba3ff;
      --danger: #e05b5b;
      --green: #4caf7d;
      --yellow: #f0c060;
      --red: #e05b5b;
      --gray: #555;
      --r: 6px;
      --mono: 'JetBrains Mono','Fira Code',monospace;
      --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { font-family: var(--mono); font-size: .9em; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 24px; border-bottom: 1px solid var(--border);
      background: var(--bg); position: sticky; top: 0; z-index: 10;
    }
    .brand {
      font-family: var(--mono); font-size: 15px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; color: var(--text); user-select: none;
    }
    .brand:hover { color: var(--accent); }

    /* Header right cluster */
    .header-right { display: flex; align-items: center; gap: 14px; }

    /* User pill */
    .user-pill { display: none; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .user-pill.visible { display: flex; }
    .user-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .user-name { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-signout { font-size: 11px; color: var(--dim); border-left: 1px solid var(--border); padding-left: 10px; }
    .user-signout:hover { color: var(--danger); text-decoration: none; }

    /* Caddy status */
    .caddy-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--dim); }
    .cdot { width: 7px; height: 7px; border-radius: 50%; background: var(--gray); flex-shrink: 0; }
    .cdot.up { background: var(--green); }
    .cdot.down { background: var(--yellow); }
    .caddy-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 24px; background: rgba(240,192,96,.07);
      border-bottom: 1px solid rgba(240,192,96,.2);
      font-size: 13px; color: var(--yellow);
    }
    .caddy-banner.hidden { display: none; }
    .caddy-banner code { background: rgba(255,255,255,.08); padding: 1px 7px; border-radius: 4px; color: #e8e8e8; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--r); border: 1px solid var(--border);
      background: transparent; color: var(--text); font-size: 13px;
      font-family: var(--sans); cursor: pointer; text-decoration: none;
      transition: background .15s, border-color .15s; white-space: nowrap;
    }
    .btn:hover { background: var(--bg-hover); border-color: #444; text-decoration: none; }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
    .btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
    .btn-danger { color: var(--danger); }
    .btn-danger:hover { background: rgba(224,91,91,.1); border-color: var(--danger); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Layout */
    main { max-width: 960px; margin: 0 auto; padding: 28px 24px; }

    /* Page header */
    .pg-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .pg-title { font-size: 20px; font-weight: 700; }

    /* Breadcrumb */
    .crumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
    .crumb a { color: var(--muted); }
    .crumb a:hover { color: var(--text); text-decoration: none; }
    .crumb-sep { color: var(--dim); }
    .crumb-cur { color: var(--text); font-weight: 500; }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 20px; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0;
    }
    .badge::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge-pending  { color: var(--yellow); background: rgba(240,192,96,.12); }
    .badge-building { color: #4f8ef7; background: rgba(79,142,247,.12); }
    .badge-running  { color: var(--green); background: rgba(76,175,125,.12); }
    .badge-failed   { color: var(--red); background: rgba(224,91,91,.12); }
    .badge-stopped  { color: var(--gray); background: rgba(85,85,85,.12); }
    .badge-none     { color: var(--dim); background: rgba(85,85,85,.08); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .badge-pending::before, .badge-building::before { animation: pulse 1.4s ease-in-out infinite; }

    /* App list */
    .app-list { display: flex; flex-direction: column; gap: 8px; }
    .app-row {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 18px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--r);
      transition: border-color .15s, background .15s;
      text-decoration: none; color: inherit; cursor: pointer;
    }
    .app-row:hover { border-color: #3a3a3a; background: var(--bg-hover); text-decoration: none; }
    .app-row-body { flex: 1; min-width: 0; }
    .app-row-name { font-family: var(--mono); font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .app-row-meta { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sep { margin: 0 5px; color: var(--dim); }
    .app-row-side { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* Empty */
    .empty { text-align: center; padding: 64px 20px; color: var(--dim); }
    .empty-icon { font-size: 34px; margin-bottom: 14px; }
    .empty-msg { margin-bottom: 18px; font-size: 14px; }

    /* Detail */
    .detail-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; margin-bottom: 22px; flex-wrap: wrap;
    }
    .detail-name { font-family: var(--mono); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .detail-sub { display: flex; align-items: center; gap: 8px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Sections */
    .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 14px; overflow: hidden; }
    .sec-head { padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .sec-body { padding: 16px; }

    /* KV grid */
    .kv { display: grid; grid-template-columns: 110px 1fr; gap: 8px 12px; font-size: 13px; }
    .kv-k { color: var(--dim); font-size: 12px; padding-top: 1px; }
    .kv-v { word-break: break-all; }

    /* Copy row */
    .copy-row {
      display: flex; align-items: center; gap: 8px;
      background: #0a0a0a; border: 1px solid var(--border);
      border-radius: var(--r); padding: 8px 12px;
      font-family: var(--mono); font-size: 12px; color: var(--muted);
      word-break: break-all;
    }
    .copy-row span { flex: 1; }
    .copy-btn { background: none; border: none; cursor: pointer; color: var(--dim); font-size: 13px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
    .copy-btn:hover { color: var(--text); background: var(--bg-hover); }

    /* Collapsible */
    .coll { border-top: 1px solid var(--border); }
    .coll-trigger {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--muted); user-select: none;
    }
    .coll-trigger:hover { background: var(--bg-hover); color: var(--text); }
    .coll-arrow { font-size: 11px; transition: transform .2s; }
    .coll.open .coll-arrow { transform: rotate(90deg); }
    .coll-body { display: none; padding: 4px 16px 16px; }
    .coll.open .coll-body { display: block; }

    /* Guide */
    .g-steps { counter-reset: step; }
    .g-step { display: flex; gap: 12px; margin-bottom: 12px; font-size: 12.5px; color: var(--muted); }
    .g-num {
      counter-increment: step; width: 22px; height: 22px; min-width: 22px;
      border-radius: 50%; background: rgba(79,142,247,.15); color: var(--accent);
      font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 2px;
    }
    .g-num::before { content: counter(step); }
    .g-body { flex: 1; line-height: 1.7; }
    .g-body strong { color: var(--text); }
    .code-block {
      background: #0a0a0a; border: 1px solid var(--border); border-radius: var(--r);
      padding: 10px 12px; font-family: var(--mono); font-size: 11.5px;
      line-height: 1.8; color: #b0c0b0; white-space: pre; overflow-x: auto; margin: 8px 0;
    }
    .g-opt { background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; margin-bottom: 10px; }
    .g-opt-title { font-weight: 600; color: var(--text); margin-bottom: 8px; font-size: 13px; }
    .g-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; background: rgba(76,175,125,.15); color: var(--green); font-weight: 600; }

    /* Deployments list */
    .dep-list { display: flex; flex-direction: column; }
    .dep-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      text-decoration: none; color: inherit; transition: background .15s;
    }
    .dep-row:last-child { border-bottom: none; }
    .dep-row:hover { background: var(--bg-hover); text-decoration: none; }
    .dep-sha { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 68px; }
    .dep-id  { font-family: var(--mono); font-size: 11px; color: var(--dim); }
    .dep-time { font-size: 12px; color: var(--dim); margin-left: auto; }

    /* Log viewer */
    .log-meta { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; font-size: 12.5px; color: var(--muted); }
    .log-meta strong { color: var(--text); }
    .log-viewer {
      background: #080808; border: 1px solid var(--border); border-radius: var(--r);
      padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.8;
      white-space: pre-wrap; word-break: break-all; color: #b0c0b0;
      min-height: 240px; max-height: 68vh; overflow-y: auto;
    }
    .log-error {
      color: var(--red); font-size: 13px; margin-bottom: 12px;
      padding: 10px 12px; background: rgba(224,91,91,.08);
      border: 1px solid rgba(224,91,91,.2); border-radius: var(--r);
    }

    /* Form */
    .form-wrap { max-width: 540px; }
    .form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .form-hint { font-size: 11px; color: var(--dim); margin-top: 4px; }
    .form-input, .form-textarea {
      width: 100%; padding: 8px 12px; background: #0a0a0a;
      border: 1px solid var(--border); border-radius: var(--r);
      color: var(--text); font-size: 13px; font-family: var(--sans); transition: border-color .15s;
    }
    .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { font-family: var(--mono); font-size: 12px; resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-actions { display: flex; gap: 10px; margin-top: 22px; }
    .input-action { display: flex; gap: 8px; }
    .input-action .form-input { flex: 1; min-width: 0; }

    /* Scan info */
    .scan-info {
      background: rgba(79,142,247,.06); border: 1px solid rgba(79,142,247,.2);
      border-radius: var(--r); padding: 14px 16px; font-size: 12.5px; color: var(--muted);
    }
    .scan-info code { background: rgba(255,255,255,.08); padding: 1px 7px; border-radius: 4px; color: var(--text); }

    /* Domain preview */
    .domain-preview {
      display: flex; align-items: center;
      background: #0a0a0a; border: 1px solid var(--border);
      border-radius: var(--r); padding: 8px 12px;
      font-family: var(--mono); font-size: 13px; color: var(--muted);
    }
    .domain-preview .name-part { color: var(--text); }
    .domain-preview .base-part { color: var(--dim); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 10px 16px; font-size: 13px;
      z-index: 200; opacity: 0; transform: translateY(8px);
      transition: opacity .2s, transform .2s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.err  { border-color: var(--danger); color: var(--danger); }

    /* Mobile */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #caddy-label { display: none; }
      main { padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
      .btn { min-height: 44px; }
      .btn-sm { min-height: 38px; padding: 8px 12px; font-size: 13px; }
      .form-input, .form-textarea { font-size: 16px; }
      .app-row-side .btn { display: none; }
      .detail-actions { width: 100%; }
      .caddy-banner { padding: 10px 16px; font-size: 12px; flex-wrap: wrap; }
      .toast { left: 16px; right: 16px; bottom: 16px; text-align: center; }
      .kv { grid-template-columns: 90px 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand" onclick="go('/')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M4.93 4.93a10 10 0 0 0 0 14.14"/>
    </svg>
    at
  </div>
  <div class="header-right">
    <div class="user-pill" id="user-pill">
      <div class="user-avatar" id="user-avatar"></div>
      <span class="user-name" id="user-name"></span>
      <a class="user-signout" id="user-signout" href="">Sign out</a>
    </div>
    <div class="caddy-pill">
      <span class="cdot" id="caddy-dot"></span>
      <span id="caddy-label">Caddy</span>
    </div>
  </div>
</header>

<div class="caddy-banner hidden" id="caddy-banner">
  ⚠ Caddy is not running — run <code>docker-compose up -d</code> to enable HTTPS proxy
</div>

<main id="root">
  <div style="padding:60px;text-align:center;color:var(--dim)">Loading…</div>
</main>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// ROUTER
// ─────────────────────────────────────────────
let _timer = null;
let _cfg = { base_domain: '' };

function go(path) { location.hash = path; }

function clearTimer() { if (_timer) { clearInterval(_timer); _timer = null; } }

function mount(html) { document.getElementById('root').innerHTML = html; }

function router() {
  clearTimer();
  const h = location.hash.replace(/^#/, '') || '/';

  if (h === '/')              return pageHome();

  let m;
  if ((m = h.match(/^\/apps\/([^/]+)\/deployments\/([^/]+)$/))) return pageDeployLogs(m[1], m[2]);
  if ((m = h.match(/^\/apps\/([^/]+)\/edit$/)))                 return pageAppForm(m[1]);
  if ((m = h.match(/^\/apps\/([^/]+)$/)))                       return pageAppDetail(m[1]);

  pageHome();
}

window.addEventListener('hashchange', router);

// ─────────────────────────────────────────────
// API
// ─────────────────────────────────────────────
const api = {
  async req(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: body != null ? { 'Content-Type': 'application/json' } : {},
      body: body != null ? JSON.stringify(body) : undefined,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    return data;
  },
  get:  (p)    => api.req('GET',    p),
  post: (p, b) => api.req('POST',   p, b),
  put:  (p, b) => api.req('PUT',    p, b),
  del:  (p)    => api.req('DELETE', p),
};

// ─────────────────────────────────────────────
// PAGE: HOME
// ─────────────────────────────────────────────
function pageHome() {
  document.title = 'at — deploy';
  mount(`
    <div class="pg-head">
      <h1 class="pg-title">Apps</h1>
      <button class="btn btn-primary" onclick="doScan(this)">↻ Scan Projects</button>
    </div>
    <div id="list-wrap"></div>
  `);
  loadHome();
  _timer = setInterval(loadHome, 10000);
}

async function loadHome() {
  const el = document.getElementById('list-wrap');
  if (!el) return;
  try {
    const apps = await api.get('/api/apps');
    if (!apps || !apps.length) {
      el.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⚡</div>
          <div class="empty-msg">No apps found.</div>
          <div class="scan-info" style="max-width:420px;margin:0 auto 16px;text-align:left">
            Drop a project folder (with a <code>Dockerfile</code>) into the <code>projects/</code> directory,
            then click <strong>↻ Scan Projects</strong> to register it.
            Optionally add an <code>at.json</code> to configure domain and port.
          </div>
          <button class="btn btn-primary" onclick="doScan(this)">↻ Scan Projects</button>
        </div>`;
      return;
    }
    el.innerHTML = `<div class="app-list">${apps.map(appRow).join('')}</div>`;
  } catch (e) {
    if (el) el.innerHTML = `<div class="empty"><div class="empty-msg" style="color:var(--red)">${esc(e.message)}</div></div>`;
  }
}

function appRow(a) {
  const dep = a.latest_deployment;
  const status = dep ? dep.status : 'none';
  return `
    <a class="app-row" href="#/apps/${a.id}">
      <div class="app-row-body">
        <div class="app-row-name">${esc(a.name)}</div>
        <div class="app-row-meta">
          ${esc(a.domain)}<span class="sep">·</span>port ${a.host_port}
        </div>
      </div>
      <div class="app-row-side" onclick="event.preventDefault();event.stopPropagation()">
        ${badge(status)}
        <button class="btn btn-sm btn-primary" onclick="doDeploy('${a.id}')">▶ Deploy</button>
      </div>
    </a>`;
}

// ─────────────────────────────────────────────
// PAGE: APP DETAIL
// ─────────────────────────────────────────────
async function pageAppDetail(id) {
  mount(`<div style="color:var(--dim);padding:40px 0">Loading…</div>`);
  let app, deps;
  try {
    [app, deps] = await Promise.all([api.get(`/api/apps/${id}`), api.get(`/api/apps/${id}/deployments`)]);
  } catch (e) {
    mount(`<div style="color:var(--red)">${esc(e.message)}</div>`); return;
  }

  document.title = `${app.name} — at`;

  mount(`
    ${crumb([['Apps','#/'], [app.name, null]])}
    <div class="detail-head">
      <div>
        <div class="detail-name">${esc(app.name)}</div>
        <div class="detail-sub">
          ${badge(deps && deps.length ? deps[0].status : 'none')}
          <span style="font-size:12px;color:var(--dim)">port ${app.host_port}</span>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-primary" onclick="doDeploy('${app.id}')">▶ Deploy</button>
        <a class="btn" href="#/apps/${app.id}/edit">✎ Edit</a>
        <button class="btn btn-danger" onclick="doDelete('${app.id}','${esc(app.name)}')">✕ Delete</button>
      </div>
    </div>

    <div class="section">
      <div class="sec-head">Info</div>
      <div class="sec-body">
        <div class="kv">
          <span class="kv-k">Domain</span>
          <span class="kv-v"><a href="http://${esc(app.domain)}" target="_blank">${esc(app.domain)}</a></span>
          <span class="kv-k">Port</span>
          <span class="kv-v">${app.container_port} (container) → ${app.host_port} (host)</span>
          <span class="kv-k">Project dir</span>
          <span class="kv-v"><code>projects/${esc(app.name)}/</code></span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-head">Deployments</div>
      ${deps && deps.length
        ? `<div class="dep-list">${deps.map(d => depRow(app.id, d)).join('')}</div>`
        : `<div class="sec-body" style="color:var(--dim);font-size:13px">No deployments yet. Click Deploy to start one.</div>`}
    </div>
  `);

  if (deps && deps.some(d => d.status === 'pending' || d.status === 'building')) {
    _timer = setInterval(() => pageAppDetail(id), 4000);
  }
}

function depRow(appId, d) {
  const sha = d.commit_sha ? d.commit_sha.slice(0, 8) : '—';
  return `
    <a class="dep-row" href="#/apps/${appId}/deployments/${d.id}">
      ${badge(d.status)}
      <span class="dep-sha">${esc(sha)}</span>
      <span class="dep-id">${d.id.slice(0, 8)}</span>
      <span class="dep-time">${relTime(d.started_at)}</span>
    </a>`;
}


// ─────────────────────────────────────────────
// PAGE: APP FORM (new + edit)
// ─────────────────────────────────────────────
async function pageAppForm(appId) {
  if (!appId) { go('/'); return; }

  let app = null;
  try { app = await api.get(`/api/apps/${appId}`); }
  catch (e) { mount(`<div style="color:var(--red)">${esc(e.message)}</div>`); return; }

  document.title = `Edit ${app.name} — at`;

  let envDisplay = '';
  try {
    if (app.env_vars && app.env_vars !== '{}') {
      envDisplay = Object.entries(JSON.parse(app.env_vars)).map(([k, v]) => `${k}=${v}`).join('\n');
    }
  } catch (_) {}

  mount(`
    ${crumb([['Apps','#/'], [app.name, `#/apps/${app.id}`], ['Edit', null]])}
    <h1 class="pg-title" style="margin-bottom:20px">Edit ${esc(app.name)}</h1>
    <div class="form-wrap">
      <div class="form-card">
        <form id="app-form" onsubmit="submitForm(event,'${appId}')">

          <div class="form-group">
            <label class="form-label">Name</label>
            <input class="form-input" name="name" value="${esc(app.name)}"
              readonly style="opacity:.55;cursor:not-allowed" />
            <div class="form-hint">Name is set by the project directory name.</div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Container Port</label>
              <input class="form-input" name="container_port" type="number" placeholder="8080" value="${app.container_port}" />
            </div>
          </div>

          ${domainField(app.domain, true)}

          <div class="form-group">
            <label class="form-label">Env Vars</label>
            <textarea class="form-textarea" name="env_vars" placeholder="KEY=VALUE&#10;ANOTHER=value">${esc(envDisplay)}</textarea>
            <div class="form-hint">One KEY=VALUE per line.</div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="form-submit">Save Changes</button>
            <a class="btn" href="#/apps/${app.id}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  `);
  wireDomainPreview();
}

async function submitForm(e, appId) {
  e.preventDefault();
  const fd = new FormData(e.target);

  const envRaw = (fd.get('env_vars') || '').trim();
  let envVars = '{}';
  if (envRaw) {
    const m = {};
    envRaw.split('\n').forEach(line => {
      const i = line.indexOf('=');
      if (i > 0) m[line.slice(0, i).trim()] = line.slice(i + 1);
    });
    envVars = JSON.stringify(m);
  }

  let domain = (fd.get('domain') || '').trim();
  if (!domain && _cfg.base_domain) {
    const name = (fd.get('name') || '').trim().toLowerCase();
    domain = name + '.' + _cfg.base_domain;
  }

  const payload = {
    domain,
    container_port: parseInt(fd.get('container_port')) || 8080,
    env_vars:       envVars,
  };

  const btn = document.getElementById('form-submit');
  btn.disabled = true;
  try {
    const app = await api.put(`/api/apps/${appId}`, payload);
    showToast('App updated');
    go(`/apps/${app.id}`);
  } catch (err) {
    showToast(err.message, true);
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────
// PAGE: DEPLOYMENT LOGS
// ─────────────────────────────────────────────
async function pageDeployLogs(appId, depId) {
  mount(`<div style="color:var(--dim);padding:40px 0">Loading…</div>`);
  let app, dep;
  try {
    [app, dep] = await Promise.all([api.get(`/api/apps/${appId}`), api.get(`/api/deployments/${depId}`)]);
  } catch (e) {
    mount(`<div style="color:var(--red)">${esc(e.message)}</div>`); return;
  }
  document.title = `Deploy ${dep.id.slice(0,8)} — at`;
  renderLogsPage(app, dep);

  if (dep.status === 'pending' || dep.status === 'building') {
    _timer = setInterval(async () => {
      try {
        const fresh = await api.get(`/api/deployments/${depId}`);
        refreshLogs(fresh);
        if (fresh.status !== 'pending' && fresh.status !== 'building') clearTimer();
      } catch (_) {}
    }, 2000);
  }
}

function renderLogsPage(app, dep) {
  const sha = dep.commit_sha ? dep.commit_sha.slice(0, 8) : '—';
  mount(`
    ${crumb([['Apps','#/'], [app.name, `#/apps/${app.id}`], [`Deploy ${dep.id.slice(0,8)}`, null]])}
    <div class="log-meta">
      <span id="log-badge">${badge(dep.status)}</span>
      <span><strong>Commit</strong> <span style="font-family:var(--mono);font-size:11.5px">${esc(sha)}</span></span>
      <span><strong>Started</strong> ${relTime(dep.started_at)}</span>
      ${dep.finished_at ? `<span><strong>Finished</strong> ${relTime(dep.finished_at)}</span>` : ''}
    </div>
    ${dep.error ? `<div class="log-error">${esc(dep.error)}</div>` : ''}
    <div class="log-viewer" id="log-out">${esc(dep.logs || '(no logs yet)')}</div>
  `);
  scrollBottom();
}

function refreshLogs(dep) {
  const el = document.getElementById('log-out');
  if (!el) return;
  const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 60;
  el.textContent = dep.logs || '(no logs yet)';
  if (atBottom) el.scrollTop = el.scrollHeight;

  const b = document.getElementById('log-badge');
  if (b) b.innerHTML = badge(dep.status);
}

function scrollBottom() {
  const el = document.getElementById('log-out');
  if (el) el.scrollTop = el.scrollHeight;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
async function doDeploy(appId) {
  try {
    const data = await api.post(`/api/apps/${appId}/deploy`);
    showToast(`Deploy started: ${data.deployment_id.slice(0, 8)}`);
    go(`/apps/${appId}/deployments/${data.deployment_id}`);
  } catch (e) { showToast(e.message, true); }
}

async function doDelete(appId, name) {
  if (!confirm(`Delete "${name}"? This will stop its container.`)) return;
  try {
    await api.del(`/api/apps/${appId}`);
    showToast(`"${name}" deleted`);
    go('/');
  } catch (e) { showToast(e.message, true); }
}

// ─────────────────────────────────────────────
// SCAN
// ─────────────────────────────────────────────
async function doScan(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Scanning…'; }
  try {
    const res = await api.post('/api/apps/scan');
    showToast(`Scan complete — ${res.total_apps} app(s) registered`);
    loadHome();
  } catch (e) {
    showToast(e.message, true);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '↻ Scan Projects'; }
  }
}

// ─────────────────────────────────────────────
// CADDY
// ─────────────────────────────────────────────
async function checkCaddy() {
  try {
    const d = await fetch('/api/status').then(r => r.json());
    const up = d.caddy === true;
    document.getElementById('caddy-dot').className = 'cdot ' + (up ? 'up' : 'down');
    document.getElementById('caddy-label').textContent = up ? 'Caddy' : 'Caddy (down)';
    document.getElementById('caddy-banner').classList.toggle('hidden', up);
  } catch (_) {}
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function toggleColl(id) { document.getElementById(id).classList.toggle('open'); }

function crumb(items) {
  return `<div class="crumb">${items.map(([label, href], i) => {
    const last = i === items.length - 1;
    const el = href && !last ? `<a href="${href}">${esc(label)}</a>` : `<span class="${last ? 'crumb-cur' : ''}">${esc(label)}</span>`;
    return i > 0 ? `<span class="crumb-sep">/</span>${el}` : el;
  }).join('')}</div>`;
}

function badge(s) {
  return `<span class="badge badge-${s||'none'}">${s||'none'}</span>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function relTime(ds) {
  if (!ds) return '—';
  const s = Math.floor((Date.now() - new Date(ds)) / 1000);
  if (s < 60)  return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function copyAttr(el) {
  const txt = el.getAttribute('data-copy');
  navigator.clipboard.writeText(txt).then(() => showToast('Copied'))
    .catch(() => {
      const t = document.createElement('textarea');
      t.value = txt; document.body.appendChild(t); t.select();
      document.execCommand('copy'); document.body.removeChild(t);
      showToast('Copied');
    });
}

function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 3500);
}

// ─────────────────────────────────────────────
// DOMAIN FIELD
// ─────────────────────────────────────────────

// Returns the domain form-group HTML. Adapts based on whether AT_BASE_DOMAIN is set.
function domainField(currentVal, isEdit) {
  const base = _cfg.base_domain;

  if (base) {
    // Auto-mode: domain is always {name}.{base_domain}
    // Strip trailing .base from currentVal to get just the name segment.
    const namePart = isEdit && currentVal.endsWith('.' + base)
      ? currentVal.slice(0, currentVal.length - base.length - 1)
      : (isEdit ? currentVal : '');
    return `
      <div class="form-group">
        <label class="form-label">Domain</label>
        <div class="domain-preview" id="domain-preview">
          <span class="name-part" id="domain-name-part">${esc(namePart || 'appname')}</span><span class="base-part">.${esc(base)}</span>
        </div>
        <div class="form-hint">Auto-generated from app name and base domain (<code>${esc(base)}</code>).</div>
      </div>`;
  }

  // Manual mode: free-form input
  return `
    <div class="form-group">
      <label class="form-label">Domain *</label>
      <input class="form-input" name="domain" placeholder="myapp.example.com" required
        value="${esc(currentVal)}" />
    </div>`;
}

// Called after pageAppForm mounts — wires up the name field to update domain preview.
function wireDomainPreview() {
  if (!_cfg.base_domain) return;
  const nameInput = document.querySelector('#app-form [name="name"]');
  const previewEl = document.getElementById('domain-name-part');
  if (!nameInput || !previewEl) return;
  nameInput.addEventListener('input', () => {
    previewEl.textContent = nameInput.value.toLowerCase() || 'appname';
  });
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
async function init() {
  try { _cfg = await api.get('/api/config'); } catch (_) {}

  if (_cfg.oauth_portal_url) {
    try {
      const me = await api.get('/api/whoami');
      if (me.email) {
        const initial = (me.name || me.email)[0].toUpperCase();
        document.getElementById('user-avatar').textContent = initial;
        document.getElementById('user-name').textContent = me.name || me.email;
        document.getElementById('user-signout').href = _cfg.oauth_portal_url + '/logout';
        document.getElementById('user-pill').classList.add('visible');
      }
    } catch (_) {}
  }

  router();
  checkCaddy();
  setInterval(checkCaddy, 15000);
}

init();
</script>
